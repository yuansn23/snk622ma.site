<html lang="zh-CN">
<head>

    <!-- Event snippet for 购买 conversion page -->
<script>
function gtag_report_conversion(url) {
  var callback = function () {
    if (typeof(url) != 'undefined') {
      window.location = url;
    }
  };
  gtag('event', 'conversion', {
      'send_to': 'AW-17041683983/2-sbCKux7qccEI_sjb4_',
      'value': 1.0,
      'currency': 'USD',
      'transaction_id': '',
      'event_callback': callback
      // 'new_customer': true /* calculate dynamically, populate with true/false */,
  });
  return false;
}
</script>
    
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تحليل اتجاهات السوق حتى عام 2026</title>
    <style>
        /* 全局重置 & 居中 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f7fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding-bottom: 80px; /* 为底部按钮留出空间（手机上） */
        }

        .landing {
            max-width: 800px;
            width: 90%;
            padding: 20px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s ease;
            text-align: center;
        }

        .landing:hover {
            transform: translateY(-2px);
        }

        .landing img {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 16px;
            cursor: pointer;
            transition: box-shadow 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .landing img:hover {
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
            transform: scale(1.01);
        }

        .landing img:active {
            transform: scale(0.97);
        }

        /* 简单的提示文字（可选） */
        .hint {
            margin-top: 18px;
            font-size: 14px;
            color: #8c8f9c;
            letter-spacing: 0.3px;
        }

        .hint span {
            display: inline-block;
            background: #f0f2f5;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: #5a5d6b;
        }

        /* ---------- 新增：底部悬浮按钮（手机优先） ---------- */
        .floating-btn {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 48px);
            max-width: 400px;
            padding: 16px 24px;
            background: linear-gradient(135deg, #1e2b6d, #2b3f9e);
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            box-shadow: 0 8px 30px rgba(27, 55, 120, 0.35);
            cursor: pointer;
            z-index: 999;
            letter-spacing: 0.5px;
            transition: box-shadow 0.3s ease, transform 0.2s ease;
            text-align: center;
            /* 呼吸动画：默认启动 */
            animation: breathe 2.2s ease-in-out infinite;
        }

        /* 呼吸特效：轻微缩放 + 阴影变化 */
        @keyframes breathe {
            0% {
                transform: translateX(-50%) scale(1);
                box-shadow: 0 8px 30px rgba(27, 55, 120, 0.35);
            }
            50% {
                transform: translateX(-50%) scale(1.04);
                box-shadow: 0 12px 40px rgba(27, 55, 120, 0.55);
            }
            100% {
                transform: translateX(-50%) scale(1);
                box-shadow: 0 8px 30px rgba(27, 55, 120, 0.35);
            }
        }

        .floating-btn:active {
            transform: translateX(-50%) scale(0.96);
            animation: none; /* 点击时暂停呼吸，更自然 */
        }

        /* 手机上隐藏提示文字（可选）但保留，不影响 */
        /* 小屏适配 */
        @media (max-width: 480px) {
            .landing {
                padding: 12px;
                border-radius: 16px;
            }
            .landing img {
                border-radius: 12px;
            }
            .hint {
                font-size: 12px;
                margin-top: 14px;
            }
            .floating-btn {
                width: calc(100% - 32px);
                bottom: 16px;
                padding: 14px 20px;
                font-size: 16px;
            }
        }

        /* 大屏幕（桌面）上可以稍微隐藏或保留，但用户仅要求手机，这里保留但限制宽度 */
        @media (min-width: 769px) {
            .floating-btn {
                max-width: 360px;
                bottom: 40px;
            }
        }
    </style>
</head>
<body>

    <div class="landing">
        <!-- 图片：img/ab1.jpg，点击后调用 k2() -->
        <img
        src="img/ab1.jpg"
        alt="pic"
        onclick="k2()"
        />
    </div>

    <!-- 新增的底部悬浮按钮 -->
    <button class="floating-btn" onclick="k2()">انضم إلى المجتمع الآن</button>

    <script>
       
        function k2() {
   gtag_report_conversion('https://lihi1.me/tRBTH'); 
        }

        //  
        console.log('✅ 落地页已加载，点击图片或底部按钮调用 k2() ');
    </script>

</body>
</html>
